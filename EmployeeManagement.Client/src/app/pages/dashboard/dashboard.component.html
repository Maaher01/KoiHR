<div class="grid">
  <div class="col-span-12">
    @if(currentUser?.role !== "Admin") {
    <app-attendance-mark-card></app-attendance-mark-card>
    }
  </div>
  <div class="col-span-12">
    @if(currentUser?.role === "Admin"|| currentUser?.role === "HR") {
    <app-monthly-attendance-chart></app-monthly-attendance-chart>
    }
  </div>
  <div class="col-span-12">
    <app-latest-notices-widget></app-latest-notices-widget>
  </div>
</div>
