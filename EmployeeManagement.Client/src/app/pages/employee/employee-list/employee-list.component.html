<mat-card class="cardWithShadow">
  <mat-card-content>
    <button matButton="filled" routerLink="/employee/add">
      <mat-icon>person_add</mat-icon>Add Employee
    </button>
    <mat-card-title style="margin-top: 30px">All Employees</mat-card-title>

    <div class="table-responsive">
      @if (employees) {
      <table mat-table [dataSource]="employees" class="w-100">
        <!-- Image Column -->
        <ng-container matColumnDef="image">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14 p-l-0"></th>
          <td mat-cell *matCellDef="let employee" class="p-l-0">
            <div class="d-flex align-items-center">
              <img [src]="
                    employee.image
                      ? 'https://localhost:7063/Photos/' + employee.image
                      : 'assets/images/avatars/default.png'
                  " alt="{{ employee.name }}" class="rounded" style="width: 44px; object-fit: contain" />
            </div>
          </td>
        </ng-container>

        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14 p-l-0">
            ID
          </th>
          <td mat-cell *matCellDef="let employee" class="p-l-0">
            <div class="d-flex align-items-center">
              <div class="m-l-16">
                <h6 class="f-s-14 f-w-600">
                  {{ employee.id }}
                </h6>
              </div>
            </div>
          </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
            Name
          </th>
          <td mat-cell *matCellDef="let employee">
            <h6 class="f-s-16 m-b-4">
              <span class="text-dark f-w-600">{{ employee.name }} </span>
            </h6>
          </td>
        </ng-container>

        <!-- Designation -->
        <ng-container matColumnDef="designation">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">Designation</th>
          <td mat-cell *matCellDef="let employee">
            <h6 class="f-s-16 m-b-4">
              <span class="text-dark f-w-600">{{ employee.designation || '—' }}
              </span>
            </h6>
          </td>
        </ng-container>

        <!-- Department Name Column -->
        <ng-container matColumnDef="departmentName">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
            Department
          </th>
          <td mat-cell *matCellDef="let employee">
            <h6 class="f-s-16 m-b-4">
              <span class="text-dark f-w-600">{{ employee.departmentName }}
              </span>
            </h6>
          </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="dateOfJoining">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
            Date Of Joining
          </th>
          <td mat-cell *matCellDef="let employee">
            <h6 class="f-s-16 m-b-4">
              <span class="text-dark f-w-600">{{ employee.dateOfJoining | date }}
              </span>
            </h6>
          </td>
        </ng-container>

        <!-- Action Column -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14"></th>
          <td mat-cell *matCellDef="let employee">
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item [routerLink]="['/employee', employee.id]">
                <mat-icon>remove_red_eye</mat-icon>
                <span>Details</span>
              </button>
              <button mat-menu-item [routerLink]="['/employee/edit', employee.id]">
                <mat-icon>edit</mat-icon>
                <span>Edit</span>
              </button>
              <button mat-menu-item (click)="deleteEmployee(employee.id)">
                <mat-icon>delete</mat-icon>
                <span>Delete</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
      } @else {
      <div class="mt-8 mb-1 text-gray-400">No employees to display</div>
      }
    </div>
    <mat-paginator [pageSize]="10" showFirstLastButtons>
    </mat-paginator>
  </mat-card-content>
</mat-card>
