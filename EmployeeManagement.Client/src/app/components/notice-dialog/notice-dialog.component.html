<h2 mat-dialog-title>{{ heading }}</h2>

<mat-dialog-content>
    @if (errorMessage) {
    <mat-error class="m-b-16">{{ errorMessage }}</mat-error>
    }

    <form [formGroup]="noticeForm" class="form-grid">

        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Title</mat-label>
            <input matInput formControlName="title" placeholder="e.g. Office Closed for Holiday" />
            <mat-error>Title is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Content</mat-label>
            <textarea matInput formControlName="content" rows="6" placeholder="Write the notice details..."></textarea>
            <mat-error>Content is required</mat-error>
        </mat-form-field>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-stroked-button (click)="closeDialog()" [disabled]="isLoading">Cancel</button>
    <button mat-flat-button color="primary" (click)="save()" [disabled]="isLoading || noticeForm.invalid">
        @if (isLoading) {
        Saving...
        } @else {
        {{ isEditMode ? 'Save Changes' : 'Publish Notice' }}
        }
    </button>
</mat-dialog-actions>
