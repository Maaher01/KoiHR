<h2 mat-dialog-title>{{ heading }}</h2>

<mat-dialog-content>

    @if (errorMessage) {
    <mat-error class="m-b-16">{{ errorMessage }}</mat-error>
    }

    <form [formGroup]="leaveTypeEditForm" class="form-grid">

        <!-- Name -->
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Leave Type Name</mat-label>
            <input matInput formControlName="name" placeholder="e.g. Casual Leave" />
            <mat-icon matPrefix>label</mat-icon>
            <mat-error>Name is required</mat-error>
        </mat-form-field>

        <!-- Max Days -->
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Max Days Per Year</mat-label>
            <input matInput type="number" formControlName="maxDaysPerYear" min="1" placeholder="e.g. 10" />
            <mat-icon matPrefix>event_available</mat-icon>
            <span matSuffix class="suffix-label">days</span>
            <mat-error *ngIf="leaveTypeEditForm.get('maxDaysPerYear')?.hasError('required')">
                Max days is required
            </mat-error>
            <mat-error *ngIf="leaveTypeEditForm.get('maxDaysPerYear')?.hasError('min')">
                Must be at least 1 day
            </mat-error>
        </mat-form-field>

    </form>

</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-stroked-button (click)="closeDialog()" [disabled]="isLoading">
        Cancel
    </button>
    <button mat-flat-button color="primary" (click)="editLeaveType()"
        [disabled]="isLoading || leaveTypeEditForm.invalid">
        @if (isLoading) { Saving... } @else { Save Changes }
    </button>
</mat-dialog-actions>
