<h2 mat-dialog-title>{{ isEditMode ? 'Edit Benefit' : 'Add Benefit' }}</h2>

<mat-dialog-content>
    <form [formGroup]="salaryBenefitForm">

        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Title</mat-label>
            <input matInput formControlName="title" />
        </mat-form-field>

        <label class="f-w-600 m-b-8 d-block">Type</label>
        <mat-radio-group formControlName="isAddition" class="d-flex gap-16 m-b-16">
            <mat-radio-button [value]="true">Addition</mat-radio-button>
            <mat-radio-button [value]="false">Deduction</mat-radio-button>
        </mat-radio-group>

        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Amount</mat-label>
            <input matInput type="number" formControlName="amount" />
        </mat-form-field>

        @if (errorMessage) {
        <div class="text-error">{{ errorMessage }}</div>
        }
    </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" [disabled]="salaryBenefitForm.invalid" (click)="save()">
        {{ isEditMode ? 'Update' : 'Save' }}
    </button>
</mat-dialog-actions>
