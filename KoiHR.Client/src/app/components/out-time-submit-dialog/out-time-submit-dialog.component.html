<mat-card class="cardWithShadow theme-card">
    <mat-card-header>
        <div class="flex flex-row justify-between items-center w-100">
            <mat-card-title class="m-b-0">{{ heading }}</mat-card-title>
            <mat-icon class="cursor-pointer" (click)="closeDialog()">close</mat-icon>
        </div>
    </mat-card-header>

    <mat-card-content class="b-t-1">
        <form [formGroup]="outTimeForm" (ngSubmit)="updateAttendance()">
            <div class="row">
                <!-- Note -->
                <div class="col-lg-12">
                    <mat-label class="f-w-600 m-b-8 d-block">Note</mat-label>
                    <mat-form-field appearance="outline" class="w-100" color="primary">
                        <textarea matInput formControlName="note" rows="3" placeholder="Add a note..."></textarea>
                    </mat-form-field>
                </div>
            </div>

            @if (errorMessage) {
            <mat-error>{{ errorMessage }}</mat-error>
            }

            <div class="m-t-12">
                <button mat-flat-button color="primary" class="m-r-8" type="submit">
                    Submit
                </button>
            </div>

        </form>
    </mat-card-content>
</mat-card>
