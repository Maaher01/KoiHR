<mat-card>
  <mat-card-content>
    <button matButton="filled" routerLink="/attendance/settings/add">
      <mat-icon>add</mat-icon>Add Settings
    </button>
    <mat-card-title style="margin-top: 30px">All Attendance Settings</mat-card-title>
    <!-- Table -->
    <div class="table-container">
      <table mat-table [dataSource]="dataSource">
        <!-- Department Name Column -->
        <ng-container matColumnDef="departmentName">
          <th mat-header-cell *matHeaderCellDef>Department</th>
          <td mat-cell *matCellDef="let row">{{ row.departmentName }}</td>
        </ng-container>

        <!-- In Time Column -->
        <ng-container matColumnDef="inTime">
          <th mat-header-cell *matHeaderCellDef>In Time</th>
          <td mat-cell *matCellDef="let row">
            {{ "1970-01-01T" + row.inTime | date: "shortTime" }}
          </td>
        </ng-container>

        <!-- Out Time Column -->
        <ng-container matColumnDef="outTime">
          <th mat-header-cell *matHeaderCellDef>Out Time</th>
          <td mat-cell *matCellDef="let row">
            {{ "1970-01-01T" + row.outTime | date: "shortTime" }}
          </td>
        </ng-container>

        <!-- Grace Period Column -->
        <ng-container matColumnDef="gracePeriodMinutes">
          <th mat-header-cell *matHeaderCellDef>Grace Period (mins)</th>
          <td mat-cell *matCellDef="let row">
            {{ row.gracePeriodMinutes }} minutes
          </td>
        </ng-container>

        <!-- Action Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14"></th>
          <td mat-cell *matCellDef="let row">
            <button (click)="editAttendanceSetting(row)">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <!-- No Data Row -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell no-data" [colSpan]="displayedColumns.length">
            No attendance settings found.
          </td>
        </tr>
      </table>
    </div>
    <mat-paginator [pageSize]="10" showFirstLastButtons>
    </mat-paginator>
  </mat-card-content>
</mat-card>
