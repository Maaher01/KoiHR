<mat-card class="cardWithShadow">
  <mat-card-content>
    <button matButton="filled" routerLink="/department/add">
      <mat-icon>add</mat-icon>Add Department
    </button>
    <mat-card-title style="margin-top: 30px">All Departments</mat-card-title>

    <div class="table-responsive">
      @if (departments) {
      <table mat-table [dataSource]="departments" class="w-100">
        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
            Name
          </th>
          <td mat-cell *matCellDef="let department">
            <h6 class="f-s-16 m-b-4">
              <span class="text-dark f-w-600">{{ department.name }} </span>
            </h6>
          </td>
        </ng-container>

        <!-- Action Column -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14"></th>
          <td mat-cell *matCellDef="let department">
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="editDepartment(department)">
                <mat-icon>edit</mat-icon>
                <span>Edit</span>
              </button>
              <button mat-menu-item (click)="deleteDepartment(department.id)">
                <mat-icon>delete</mat-icon>
                <span>Delete</span>
              </button>
            </mat-menu>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
      } @else {
      <div class="mt-8 mb-1 text-gray-400">No departments to display</div>
      }
    </div>
    <mat-paginator [pageSize]="10" showFirstLastButtons>
    </mat-paginator>
  </mat-card-content>
</mat-card>
