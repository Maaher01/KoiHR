<mat-card class="cardWithShadow">
  <mat-card-content>
    <button matButton="filled" routerLink="/user/add">
      <mat-icon>person_add</mat-icon>Add User
    </button>
    <mat-card-title style="margin-top: 30px">All Users</mat-card-title>

    <div class="table-responsive">
      @if (users) {
      <table mat-table [dataSource]="users" class="w-100">
        <!-- Email Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
            Email
          </th>
          <td mat-cell *matCellDef="let user">
            <h6 class="f-s-16 m-b-4">
              <span class="text-dark f-w-600">{{ user.email }} </span>
            </h6>
          </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
            Role
          </th>
          <td mat-cell *matCellDef="let user">
            <h6 class="f-s-16 m-b-4">
              <span class="text-dark f-w-600">{{ user.role }} </span>
            </h6>
          </td>
        </ng-container>

        <!-- Action Column -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14"></th>

          <td mat-cell *matCellDef="let user">
            @if (
            (currentUser?.role == "Admin" || currentUser?.role == "HR") &&
            user.role != "Admin"
            ) {
            <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
              <mat-icon>more_vert</mat-icon>
            </button>

            <mat-menu #menu="matMenu">
              <!-- <button mat-menu-item [routerLink]="['/user', user.id]">
                                <mat-icon>remove_red_eye</mat-icon>
                                <span>Details</span>
                            </button> -->
              <button mat-menu-item (click)="editUser(user)">
                <mat-icon>edit</mat-icon>
                <span>Edit</span>
              </button>
              <button mat-menu-item (click)="deleteUser(user.id)">
                <mat-icon>delete</mat-icon>
                <span>Delete</span>
              </button>
            </mat-menu>
            }
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
      } @else {
      <div class="mt-8 mb-1 text-gray-400">No users to display</div>
      }
    </div>
    <mat-paginator [pageSize]="10" showFirstLastButtons>
    </mat-paginator>
  </mat-card-content>
</mat-card>
