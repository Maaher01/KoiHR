<div class="not-found-wrapper">
  <h1 class="error-code">404</h1>
  <h2 class="m-b-8">Page not found</h2>
  <p class="text-muted m-b-24">
    The page you're looking for doesn't exist or you don't have permission to
    access it.
  </p>
  <button mat-flat-button color="primary" routerLink="/dashboard">
    Go to dashboard
  </button>
  <p class="text-muted m-t-24" style="font-size: 13px">
    Or contact your administrator if you think this is a mistake.
  </p>
</div>
