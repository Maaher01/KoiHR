<mat-toolbar class="topbar gap-8">
  <!-- Mobile Menu -->
  @if (!showToggle) {
  <button mat-icon-button (click)="toggleMobileNav.emit()" class="d-flex justify-content-center">
    <i class="iconify icon-20 d-flex" data-icon="solar:hamburger-menu-line-duotone"></i>
  </button>
  }
  <!-- --------------------------------------------------------------- -->
  <!-- Notification Dropdown -->
  <!-- --------------------------------------------------------------- -->
  <span class="flex-1-auto"></span>

  <!-- --------------------------------------------------------------- -->
  <!-- profile Dropdown -->
  <!-- --------------------------------------------------------------- -->
  <button mat-icon-button aria-label="Notifications" [matMenuTriggerFor]="menu"
    class="d-flex align-items-center justify-content-center">
    <div matBadge="2" matBadgeSize="small" matBadgeOverlap="false" class="demo-section">
      <i class="iconify icon-20 d-flex" data-icon="solar:bell-line-duotone"></i>
    </div>
  </button>

  <mat-menu #menu="matMenu" class="notification-menu">
    <div class="notification-header">
      <span class="f-w-600">Notices</span>
    </div>

    @if (recentNotices.length > 0) {
    @for (notice of recentNotices; track notice.id) {
    <button mat-menu-item [routerLink]="['/notice', notice.id]" class="notification-item">
      <div class="d-flex flex-column align-items-center justify-between">
        <span class="f-w-600 notification-title">{{ truncate(notice.title) }}</span>
        <span class="text-muted notification-date">{{ notice.publishedAt | date:'MMM d' }}</span>
      </div>
    </button>
    }
    <button mat-menu-item routerLink="/notice" class="view-all-item">
      <span class="text-primary f-w-600">View all notices</span>
    </button>
    } @else {
    <div class="notification-empty text-muted">No notices yet.</div>
    }
  </mat-menu>
  @if (currentUser) {
  <button mat-icon-button extended [matMenuTriggerFor]="profilemenu" aria-label="Notifications"
    class="d-flex align-items-center justify-content-center profile-btn-dd">
    <img [src]="
          currentUser.image
            ? 'https://localhost:7063/Photos/' + currentUser.image
            : 'assets/images/avatars/default.png'
        " class="rounded-circle object-contain icon-35 profile-dd" width="35" />
  </button>
  }
  <mat-menu #profilemenu="matMenu" class="topbar-dd cardWithShadow">
    <button mat-menu-item [routerLink]="['/profile']">
      <mat-icon class="d-flex align-items-center"><i data-icon="solar:user-id-line-duotone"
          class="iconify icon-22"></i></mat-icon>My Account
    </button>
    <div class="p-x-12 m-t-12">
      <button mat-stroked-button (click)="logout()" class="w-100">
        Logout
      </button>
    </div>
  </mat-menu>
</mat-toolbar>
